<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SXS | DISCORD ACCESS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div class="overlay"></div>
    <main class="container">
        <header class="hero">
            <h1 class="logo">SXS</h1>
            <p class="tagline">INORGANIC ACCESS GATEWAY</p>
        </header>
        
        <section class="auth-box">
            <div class="status-indicator">
                <span class="dot"></span>
                <span class="status-text">SYSTEM OPERATIONAL</span>
            </div>
            
            <div class="content">
                <h2 class="title">SERVER VERIFICATION</h2>
                <p class="description">Discord OAuth2を介して、SXSサーバーへの自動参加と認証を完了します。続行するには以下のボタンをクリックしてください。</p>
            </div>
            
            <div class="actions">
                <div id="captcha-container" class="cf-turnstile" data-sitekey="YOUR_TURNSTILE_SITE_KEY" data-theme="dark" data-callback="onCaptchaSuccess"></div>
                <br>
                <a href="#" id="join-btn" class="btn-primary disabled" onclick="startAuth(event)">
                    <span class="btn-text">AUTHORIZE ACCESS</span>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </a>
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2026 SXS SYSTEMS. ALL RIGHTS RESERVED.</p>
            <div class="meta">
                <span>SECURED CONNECTION</span>
                <span class="separator">/</span>
                <span>ENC-256</span>
            </div>
        </footer>
    </main>

    <script>
        let captchaToken = null;

        function onCaptchaSuccess(token) {
            captchaToken = token;
            const btn = document.getElementById('join-btn');
            btn.classList.remove('disabled');
            console.log('Verification Complete');
        }

        function startAuth(event) {
            event.preventDefault();
            if (!captchaToken) return;
            
            // Redirect to auth with captcha token in query or session
            // For simplicity, we'll just redirect. The backend should ideally verify it later.
            window.location.href = `/auth/discord?cf_token=${captchaToken}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            console.log('SXS Gateway Initialized');
        });
    </script>
</body>
</html>
