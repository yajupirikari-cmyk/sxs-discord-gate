<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SXS | DISCORD ACCESS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    <main class="container">
        <header class="hero">
            <h1 class="logo">SXS</h1>
            <p class="tagline">INORGANIC ACCESS GATEWAY</p>
        </header>
        
        <section class="auth-box">
            <div class="status-indicator">
                <span class="dot"></span>
                <span class="status-text">SYSTEM OPERATIONAL</span>
            </div>
            
            <div class="content">
                <h2 class="title" style="margin-bottom: 0.5rem;">HUMAN VERIFICATION</h2>
                <p class="description">以下の文字を入力して認証を完了してください。</p>
                
                <div class="captcha-wrapper">
                    <div class="captcha-image-container">
                        <img id="captcha-img" src="" alt="Captcha">
                        <button type="button" class="refresh-btn" onclick="refreshCaptcha()">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"></path></svg>
                        </button>
                    </div>
                    <input type="text" id="captcha-input" placeholder="ENTER CODE" maxlength="6" autocomplete="off">
                </div>
            </div>
            
            <div class="actions">
                <a href="#" id="join-btn" class="btn-primary" onclick="startAuth(event)">
                    <span class="btn-text">AUTHORIZE ACCESS</span>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </a>
                <p class="privacy-note">
                    ※ メールアドレスへのアクセスは、Discord上の「認証済みアカウント」であることを確認し、Botの自動参加を防ぐためのセキュリティ目的のみに使用されます。アドレスが収集・保存されることはありません。
                </p>
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2026 SXS SYSTEMS. ALL RIGHTS RESERVED.</p>
            <div class="meta">
                <span>SECURED CONNECTION</span>
                <span class="separator">/</span>
                <span>NON-BOT VALIDATED</span>
            </div>
        </footer>
    </main>

    <script>
        async function refreshCaptcha() {
            const res = await fetch('/api/captcha');
            const data = await res.json();
            document.getElementById('captcha-img').src = data.image;
            document.getElementById('captcha-input').value = '';
        }

        function startAuth(event) {
            event.preventDefault();
            const captcha = document.getElementById('captcha-input').value;
            if (!captcha) return alert('CAPTCHAを入力してください。');
            
            window.location.href = `/auth/discord?captcha=${captcha}`;
        }

        document.addEventListener('DOMContentLoaded', refreshCaptcha);
    </script>
</body>
</html>
